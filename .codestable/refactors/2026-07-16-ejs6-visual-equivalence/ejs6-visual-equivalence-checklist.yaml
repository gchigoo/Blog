    action: 增加固定版本的 Playwright dev 测试基座、临时 SQLite/JWT/时钟 fixture、固定外部字体和 new.css 响应，并定义 3 个桌面 Chromium 与 3 个移动 WebKit projects。
    exit_signal: 17 个页面场景可在 6 个视觉 projects 稳定访问，不读写根 blog.db，不依赖外部网络漂移，现有 node:test 不回归。
  - id: approve-ejs3-baseline
    status: done
    action: 在 EJS 3.1.10 下生成 17 份 HTML snapshot、102 份 layout/style snapshot 和 102 张全页 PNG，并连续运行两次后提交 HUMAN 目视审批。
    exit_signal: 两次运行 HTML 与 layout/style 均零差异、图片均在限定抗锯齿阈值内、无 flaky/retry；用户明确确认基线代表当前正确页面。
  - id: upgrade-ejs-only
    status: done
    action: 仅将 EJS 固定升级到 6.0.1 并重建 package-lock；不修改生产 JS、EJS、CSS、文案或 expected snapshots。
    exit_signal: npm ci 成功，npm ls 仅有 ejs@6.0.1，升级切片只包含 package.json 与 package-lock.json 的预期差异。
  - id: prove-zero-visual-diff
    status: done
    action: 在 updateSnapshots=none 下运行现有测试、17 份 HTML snapshot、102 份零容差 layout/style snapshot、102 张受限抗锯齿视觉 snapshot、视图/CSS scope gate和依赖检查。
    exit_signal: 所有自动化一次通过，HTML 0 diff、layout/style 0 diff、视觉差异不超过抗锯齿硬上限、views/custom.css 0 diff；任何失败均已阻断而非更新基线。
  - id: human-review-and-closure
    status: done
    action: 组织 17 场景 × 6 设备的证据索引，完成用户目视验收和 cs-code-review 独立 diff 审查，记录 apply notes 与回滚点。
    exit_signal: 用户明确确认布局和样式无变化，code review 无 Critical/Important，回滚仅需撤销 EJS 依赖切片。
