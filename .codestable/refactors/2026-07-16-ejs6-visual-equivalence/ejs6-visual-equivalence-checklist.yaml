dod:
  commands:
    - id: install
      command: npm ci
      core: true
      failure_handling: fix-or-block
    - id: unit-tests
      command: npm test
      core: true
      failure_handling: fix-or-block
    - id: ejs-version
      command: npm ls ejs --depth=0
      core: true
      failure_handling: fix-or-block
    - id: html-snapshots
      command: npm run test:html-snapshots
      core: true
      failure_handling: rollback-or-block
    - id: visual-snapshots
      command: npm run test:visual
      core: true
      failure_handling: rollback-or-block
    - id: production-audit
      command: npm audit --omit=dev --audit-level=high
      core: false
      failure_handling: fix-or-block
  evidence_required:
    - command_output
    - html_snapshot_report
    - browser_screenshots
    - screenshot_diff_report
    - dependency_diff
    - human_visual_confirmation
    - code_review_report
  cleanliness:
    production_view_changes: forbidden
    production_css_changes: forbidden
    updated_expected_snapshots_after_upgrade: forbidden
    debug_output: forbidden
    secrets_or_tokens: forbidden
