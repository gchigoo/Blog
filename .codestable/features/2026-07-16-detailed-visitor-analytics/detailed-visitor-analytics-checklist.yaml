dod:
  commands:
    - id: CMD-001
      command: "node --test test/analytics*.test.js"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "npm test"
      core: true
      failure_handling: fix-or-block
    - id: CMD-003
      command: "npm audit --omit=dev --audit-level=high"
      core: true
      failure_handling: fix-or-block
    - id: CMD-004
      command: "nginx -t"
      core: false
      failure_handling: document-baseline
    - id: CMD-005
      command: "100k fixture + list/overview EXPLAIN QUERY PLAN benchmark and response-size assertion"
      core: true
      failure_handling: fix-or-block
    - id: CMD-006
      command: "node --test test/analytics-geoip-update.test.js (Linux)"
      core: true
      failure_handling: fix-or-block
    - id: CMD-007
      command: "systemd-analyze verify deploy/systemd/blog-geoip-update.service deploy/systemd/blog-geoip-update.timer"
      core: true
      failure_handling: fix-or-block
  evidence_required: [command_output, api_response, database_assertion, query_plan_report, performance_report, malicious_dom_fixture, browser_screenshot, cross_browser_smoke, nginx_smoke, cache_header_smoke, systemd_timer_status, mmdb_bootstrap_smoke, mmdb_update_smoke, mmdb_failure_rollback_smoke, mmdb_reload_smoke, geoip_status_provider_report, diff_summary]
  cleanliness:
    debug_output: forbidden
    todo_fixme: forbidden
    commented_code: forbidden
    unused_imports: forbidden
    secrets_in_analytics_logs: forbidden
    production_user_fixtures: forbidden
