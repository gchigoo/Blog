# Production configuration for blog.cokedaily.space
# Install this file as /etc/nginx/sites-available/blog.conf and enable it.
# Install cloudflare-real-ip.conf as /etc/nginx/snippets/cloudflare-real-ip.conf first.

server {
    listen 80;
    listen [::]:80;
    server_name blog.cokedaily.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name blog.cokedaily.space;

    ssl_certificate /etc/nginx/ssl/origin-space.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-space.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Trust only Cloudflare to supply the real visitor address.
    include /etc/nginx/snippets/cloudflare-real-ip.conf;

    # Keep the public analytics context endpoint on its strict 16 KiB boundary.
    location = /api/analytics/client-context {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_cache off;
        client_max_body_size 16k;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Deliberately overwrite, rather than append, untrusted client XFF.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50m;
    }

    location /images/ {
        alias /root/Blog/public/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    location ~* \.(webp|ico)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    access_log /var/log/nginx/blog-access.log;
    error_log /var/log/nginx/blog-error.log;
}
